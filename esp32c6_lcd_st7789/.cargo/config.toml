[target.riscv32imac-unknown-none-elf]
runner = "espflash flash --monitor --chip esp32c6 --log-format defmt"
# runner = "sh -c 'espflash flash --monitor target/riscv32imac-unknown-none-elf/release/esp32c6_lcd_st7789 | defmt-print -e target/riscv32imac-unknown-none-elf/release/esp32c6_lcd_st7789'"
# runner = "sh -c 'espflash flash --monitor $0 | defmt-print -e $0'"
# runner = "espflash flash --monitor --chip esp32c6"

[env]
DEFMT_LOG = "info" # optimal level, more detailed `debug`
EMBASSY_EXECUTOR_TASK_ARENA_SIZE = "12288"

[build]
rustflags = [
  # Required to obtain backtraces (e.g. when using the "esp-backtrace" crate.)
  # NOTE: May negatively impact performance of produced code
  "-C", "force-frame-pointers",
  "-Clink-args=-Map=esp32c6_lcd_st7789.map",
  "-C", "link-arg=--cref",              # Таблица перекрестных ссылок
  "-C", "link-arg=--gc-sections",       # Удаление неиспользуемого кода
   "-C", "link-arg=-Tdefmt.x", # defmt
]

target = "riscv32imac-unknown-none-elf"

[unstable]
build-std = ["core"]

# For rust-lld (common in embedded/bare-metal targets)
# The -Wl, is not needed when talking directly to rust-lld
# rustflags = ["-Clink-args=-Map=esp32c6_lcd_st7789.map"]